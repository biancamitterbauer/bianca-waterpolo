<section class="news-shell">
  <section class="site-container instagram-highlight" aria-label="Instagram Highlights">
    <div class="highlight-header">
      <div>
        <p class="hero-kicker">Instagram Highlights</p>
        <h1>Aktuelle Beiträge</h1>
        <p>
          Die fünf neuesten Beiträge von Bianca Mitterbauer.
        </p>
      </div>
      <a
        class="instagram-card__cta highlight-cta"
        href="https://www.instagram.com/spandau04_official/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Profil ansehen ↗
      </a>
    </div>

    <div class="instagram-grid" role="list">
      <article class="instagram-card" *ngFor="let post of instagramPosts" role="listitem">
        <header class="instagram-card__header">
          <a
            class="instagram-card__identity"
            [href]="post.accountUrl"
            target="_blank"
            rel="noopener noreferrer"
            [attr.aria-label]="'Instagram-Profil von ' + post.accountLabel + ' öffnen'"
          >
            <span class="avatar-pill" [class.avatar-pill--image]="post.accountProfileImage">
              <img
                *ngIf="post.accountProfileImage"
                [src]="post.accountProfileImage"
                [alt]="'Profilbild ' + post.accountLabel"
                loading="lazy"
                referrerpolicy="no-referrer"
              />
              <span *ngIf="!post.accountProfileImage">IG</span>
            </span>
            <div>
              <p class="account-label">{{ post.accountLabel }}</p>
              <p class="account-handle">{{ post.accountHandle }}</p>
            </div>
          </a>
        </header>

        <a
          class="embed-wrapper"
          [href]="post.permalink"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Beitrag auf Instagram öffnen"
        >
          <img
            [src]="post.imageUrl"
            alt="Instagram Post Preview"
            loading="lazy"
            referrerpolicy="no-referrer"
          />
        </a>

        <div class="instagram-meta">
          <p class="post-caption">{{ post.caption }}</p>
        </div>
      </article>
    </div>
  </section>

</section>
