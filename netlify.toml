[build]
  command = "npm ci && npx ng build"
  publish = "dist/bianca-waterpolo/browser"

[build.environment]
  NODE_VERSION = "20"

# Route all requests through the Angular SSR edge function
# Exclude Netlify Forms submission endpoint so the built-in form handler processes POSTs.
[[edge_functions]]
  path = "/*"
  function = "server"
  excluded_path = ["/__forms.html", "/forms/*"]

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
